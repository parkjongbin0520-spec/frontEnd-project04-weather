<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>날씨 기반 코디 추천 웹</title>
    <style>
      /* 기본 초기화 */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Malgun Gothic", sans-serif;
        color: #555;
      }
      body {
        background-color: #fff;
      }

      /* 공통 유틸리티 */
      .border-box {
        border: 2px solid #888;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: bold;
      }

      /* ---------------------------------
           스크롤 01 영역 (첫 화면)
        --------------------------------- */
      .screen-01 {
        position: relative;
        height: 100vh; /* 화면 꽉 차게 */
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .screen-01 .top-logo {
        position: absolute;
        top: 20px;
        font-size: 1.2rem;
      }
      .screen-01 h1 {
        font-size: 4rem;
        line-height: 1.4;
        color: #888;
      }

      /* ---------------------------------
           앱 메인 컨테이너 (스크롤 02, 03 포함)
        --------------------------------- */
      .main-app {
        position: relative;
      }

      /* 공통 헤더 (스크롤 시 상단 고정) */
      .app-header {
        position: sticky;
        top: 0;
        background: #fff;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        border-top: 2px solid #888;
        border-bottom: 2px solid #888;
      }
      .app-header .left-info {
        display: flex;
        gap: 20px;
        font-size: 1.2rem;
        font-weight: bold;
      }
      .app-header .theme-switch {
        border: 2px solid #888;
        border-radius: 20px;
        padding: 5px 15px;
        color: #f77f00;
        font-weight: bold;
      }

      /* ---------------------------------
           스크롤 02 영역 (간략 추천)
        --------------------------------- */
      .screen-02 {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      /* 상단: 전체 코디 & 추천 코디 */
      .top-content {
        display: flex;
        gap: 20px;
        height: 400px;
      }
      .main-outfit {
        flex: 2;
        color: #f77f00;
      }
      .today-recommend {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 10px;
      }
      .today-recommend h3 {
        margin-bottom: 15px;
      }
      .item-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .item-grid .box {
        aspect-ratio: 1; /* 정사각형 */
      }
      .item-desc {
        font-size: 0.9rem;
        color: #888;
      }

      /* 하단: 탭 & 가로 스크롤 카드 */
      .bottom-content {
        margin-top: 10px;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: -2px; /* 겹치게 */
      }
      .tabs span {
        border: 2px solid #888;
        border-bottom: none;
        padding: 10px 30px;
        border-radius: 10px 10px 0 0;
        background: #fff;
        font-weight: bold;
      }
      .card-row {
        display: flex;
        gap: 15px;
        overflow-x: auto; /* 가로 스크롤 */
        border-top: 2px solid #888;
        padding-top: 20px;
      }
      .card-row .card {
        min-width: 150px;
        height: 150px;
      }

      /* ---------------------------------
           스크롤 03 영역 (목록 및 필터)
        --------------------------------- */
      .screen-03 {
        display: flex;
        gap: 20px;
        padding: 20px;
        position: relative;
      }

      /* 좌측 사이드바 (스크롤 시 고정됨) */
      .sidebar {
        flex: 1;
        position: sticky;
        top: 80px; /* 헤더 높이만큼 띄움 */
        height: calc(100vh - 100px);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .sidebar .side-box {
        flex: 1;
      }

      /* 우측 카드 리스트 영역 (아래로 스크롤 됨) */
      .scroll-content {
        flex: 3;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        padding-bottom: 100px; /* 네비게이션 바 공간 확보 */
      }
      .scroll-content .card {
        height: 250px;
      }
      .scroll-content .card.highlight {
        color: #f77f00;
      }

      /* 하단 플로팅 네비게이션 바 */
      .floating-nav {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 50px;
        background: #fff;
        border: 2px solid #000;
        border-radius: 25px;
        color: #f77f00;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <section class="screen-01">
      <div class="top-logo">로고</div>
      <h1>기온 및 날씨<br />정보</h1>
    </section>

    <div class="main-app">
      <header class="app-header">
        <div class="left-info">
          <span>로고</span>
          <span>날씨 정보 (간략히)</span>
        </div>
        <div class="theme-switch">UI 색상 스위치(봄 여름 가을 겨울)</div>
      </header>

      <section class="screen-02">
        <div class="top-content">
          <div class="border-box main-outfit">
            전체적인 코디 셋업<br />(남녀 모델 사진)
          </div>
          <div class="border-box today-recommend">
            <h3>오늘의 추천 코디</h3>
            <div class="item-grid">
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
            </div>
            <p class="item-desc">
              의류? 아이템 설명<br />가격이라던가 이름이라던가 특징이라던가
            </p>
          </div>
        </div>

        <div class="bottom-content">
          <div class="tabs">
            <span>상의</span>
            <span>팬츠</span>
            <span>셋업</span>
            <span>아우터</span>
            <span>언더웨어</span>
          </div>
          <div class="card-row">
            <div class="border-box card">카드</div>
            <div class="border-box card">카드</div>
            <div class="border-box card">카드</div>
            <div class="border-box card">카드</div>
            <div class="border-box card">카드</div>
          </div>
        </div>
      </section>

      <section class="screen-03">
        <aside class="sidebar">
          <div class="border-box side-box">의류 카테고리</div>
          <div class="border-box side-box">검색 필터</div>
        </aside>

        <div class="scroll-content">
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card highlight">
            아래로<br />스크롤시 해당<br />영역만 움직임
          </div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
        </div>

        <div class="border-box floating-nav">네비게이션 바</div>
      </section>
    </div>
  </body>
</html>
